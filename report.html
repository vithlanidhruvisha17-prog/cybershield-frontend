<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Feed | CyberShield Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
        body { background-color: #000; color: white; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .insta-card { background-color: #0b0b0b; border: 1px solid #262626; transition: all 0.3s ease; }
        .ticker-wrap { background: rgba(38, 38, 38, 0.2); border: 1px solid #262626; border-radius: 12px; overflow: hidden; padding: 15px 0; }
        .ticker { display: flex; white-space: nowrap; width: max-content; animation: marquee 60s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .tag-red { color: #ef4444; font-weight: 900; margin-right: 8px; }

        @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
    <script>
        // 1. Instant Security Check (Redirects if not logged in)
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-[#0b0b0b] text-white font-sans selection:bg-[#FFD700] selection:text-black">

<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-20 py-6 transition-all duration-300 ease-in-out">
    <div class="flex items-center gap-2 group cursor-pointer">
        <div class="w-8 h-8 bg-[#FFD700] rounded-lg flex items-center justify-center text-black font-black text-xl shadow-[0_0_15px_rgba(255,215,0,0.3)]">C</div>
        <span class="text-[#FFD700] text-2xl font-black tracking-tighter uppercase group-hover:tracking-normal transition-all">CyberShield Hub</span>
    </div>
    <ul class="hidden md:flex items-center space-x-10">
        <li><a href="index.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Home</a></li>
        <li><a href="report.html" class="text-[#FFD700] text-xs font-bold uppercase tracking-widest relative after:content-[''] after:absolute after:bottom-[-4px] after:left-0 after:w-full after:h-[2px] after:bg-[#FFD700]">Posts</a></li>
        <li><a href="tutorial.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Tutorial</a></li>
        <li><a href="live.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Live</a></li>
        <li><a href="about.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">About</a></li>
    </ul>
    <div class="flex items-center gap-4"> 
    <a href="profile.html" class="flex items-center gap-3 border-2 border-yellow-400 rounded-full p-0.5">
        <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-yellow-400">
            <i class="fa-solid fa-user"></i>
        </div>
    </a>
</div>
</nav>

<div class="max-w-7xl mx-auto flex justify-center gap-10 pt-32 px-4">
    <main class="w-full md:max-w-[600px] mb-20">
        <div class="mb-10">
            <div class="flex items-center gap-2 text-[10px] font-black text-zinc-500 tracking-widest mb-3">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> LIVE THREATS
            </div>
            <div class="ticker-wrap">
                <div id="newsTicker" class="ticker">
                    <div class="ticker-item px-10 text-xs">Fetching latest cyber intelligence...</div>
                </div>
            </div>
        </div>

        <div id="feed-container" class="space-y-8">
            <div id="loading-text" class="text-center py-20 text-zinc-700 animate-pulse uppercase tracking-widest text-xs">Loading Secure Feed...</div>
        </div>
    </main>

    <aside class="hidden lg:block w-80 sticky top-32 h-fit">
        <div class="p-6 border border-zinc-800 rounded-2xl bg-zinc-900/20">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-5">Threat Probability</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold">Phishing</span>
                    <span class="text-[9px] text-yellow-400 font-black">8.2/10 HIGH</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold">Malware</span>
                    <span class="text-[9px] text-red-500 font-black">9.5/10 CRITICAL</span>
                </div>
            </div>
        </div>
    </aside>
</div>

<script>
    
    // Fake Usernames ki list
    const users = ["Cyber_Guardian", "Root_Access", "Shield_Master", "Dhruvi_17", "Hack_Stopper", "Security_Pro", "ZeroDay_Hunter"];

    // Niche wale script block mein jao aur window.onload ko aise likho:
function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
window.onload = async () => {
    // 1. Pehle Navbar Update (Head wala logic yahan shift kar do)
    const currentUser = localStorage.getItem("currentUser");
    const navRight = document.querySelector('.flex.items-center.gap-4');
    
    if (currentUser && navRight) {
        navRight.innerHTML = `
            <div class="flex items-center gap-3 bg-black/20 p-1 pr-4 rounded-full border border-white/5">
            <a href="profile.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <div class="w-8 h-8 bg-[#FFD700] rounded-full flex items-center justify-center text-black font-black text-sm">
                    ${currentUser.charAt(0).toUpperCase()}
                </div>
                <span class="text-[#FFD700] text-xs font-bold uppercase tracking-widest">${currentUser}</span>
            </a>
                <button onclick="logout()" class="ml-4 pl-4 border-l border-white/10 text-[10px] text-red-500 font-black hover:text-red-400 transition-colors">
                    LOGOUT
                </button>
            </div>
        `;
    }

    // 2. Phir Feed aur News Load karo
    loadLiveHeadlines();
    await loadFullFeed(); 
};

    async function loadFullFeed() {
    try {
        const feed = document.getElementById('feed-container');
        const loader = document.getElementById('loading-text');

        console.log("Fetching AI Data...");
        const aiRes = await fetch('https://cybershield-backend-pt18.onrender.com/reports');
        const aiData = await aiRes.json();
        console.log("AI Data Received:", aiData.length);

        console.log("Fetching Kaggle Data...");
        const kaggleRes = await fetch('https://cybershield-backend-pt18.onrender.com/api/reports');
        const kaggleData = await kaggleRes.json();
        console.log("Kaggle Data Received:", kaggleData.length);

        if(loader) loader.remove();
        feed.innerHTML = '';

        // Sabhi data ko ek array mein merge karo
        const unifiedData = [
            ...aiData.map(item => ({
                ...item, 
                isAI: true, 
                sortDate: new Date(item.createdAt || Date.now()) 
            })),
            ...kaggleData.map(item => ({
                text: item.text, 
                result: `Threat Classification: ${item.label || 'Malicious Activity'}\nStatus: Verified by Global Database.`,
                createdAt: item.createdAt || new Date(),
                isAI: false,
                sortDate: new Date(0) // Kaggle data ko purana maan lo taaki AI upar aaye
            }))
        ];

        // Sorting Logic: Pehle AI posts, phir Latest Date
        unifiedData.sort((a, b) => b.sortDate - a.sortDate);

        console.log("Final Unified Data Count:", unifiedData.length);

        unifiedData.forEach(post => {
            const randomUser = users[Math.floor(Math.random() * users.length)];
            const postHTML = createProfessionalPost(post, randomUser);
            feed.insertAdjacentHTML('beforeend', postHTML);
        });

    } catch (err) { 
        console.error("Feed Loading Error:", err); 
    }
}

    function createProfessionalPost(data, username) {
    const imageHTML = data.image ? 
    `<div class="w-full h-auto mb-4 overflow-hidden rounded-xl border border-zinc-800">
        <img src="${data.image}" class="w-full object-cover">
     </div>` : '';

    return `
    <article class="insta-card rounded-2xl overflow-hidden mb-8 border border-zinc-800 shadow-2xl bg-[#0b0b0b]">
        <div class="p-4 flex items-center justify-between border-b border-zinc-900">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full border-2 border-yellow-500 p-0.5">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${username}" class="rounded-full bg-zinc-800">
                </div>
                <div>
                    <p class="text-[12px] font-black tracking-tight text-white">${username}</p>
                    <p class="text-[8px] text-zinc-500 uppercase">${data.isAI ? 'Verified Analyst' : 'Security Reporter'}</p>
                </div>
            </div>
            <i class="fa-solid fa-ellipsis text-zinc-600"></i>
        </div>

        <div class="p-6">
            ${imageHTML}
            <div class="mb-5 bg-zinc-900/30 p-4 rounded-xl border border-zinc-800/50">
                <p class="text-[9px] text-yellow-500 font-black mb-2 uppercase tracking-widest">Reported Content:</p>
                <p class="text-xs text-zinc-400 leading-relaxed italic">"${data.text}"</p>
            </div>
            
            <div class="text-[14px] text-zinc-200 leading-relaxed font-medium whitespace-pre-line border-l-2 border-yellow-500/50 pl-4">
                ${data.result ? data.result : (data.label || 'Malicious Activity Detected')}
            </div>
        </div>

        <div class="px-6 py-4 border-t border-zinc-900 flex items-center gap-6">
            <button onclick="handleLike('${data._id}', this)" class="hover:text-red-500 transition-colors flex items-center gap-2 text-zinc-400 text-sm">
                <i class="${data.likes > 0 ? 'fa-solid text-red-500' : 'fa-regular'} fa-heart"></i> 
                <span class="text-[10px] font-bold">${data.likes || 0}</span>
            </button>
            
            <button onclick="toggleCommentBox('${data._id}')" class="hover:text-blue-500 transition-colors flex items-center gap-2 text-zinc-400 text-sm">
                <i class="fa-regular fa-comment"></i> 
                <span class="text-[10px] font-bold">Reply</span>
            </button>

            <button onclick="handleShare(\`${data.text.replace(/`/g, "'")}\`, '${data._id}')" class="hover:text-green-500 transition-colors flex items-center gap-2 text-zinc-400 text-sm">
                <i class="fa-solid fa-share-nodes"></i>
                <span class="text-[10px] font-bold">Share</span>
            </button>
        </div>

        <div id="comment-section-${data._id}" class="hidden px-6 pb-6 border-t border-zinc-900/50 bg-black/20">
        <div class="pt-4 space-y-3 max-h-40 overflow-y-auto mb-4" id="comments-list-${data._id}">
            ${data.comments ? data.comments.map(c => `
                <div class="text-[11px] bg-zinc-900/50 p-2 rounded-lg border border-zinc-800">
                    <span class="text-yellow-500 font-bold">${c.username}:</span> 
                    <span class="text-zinc-300">${c.text}</span>
                </div>
            `).join('') : '<p class="text-[9px] text-zinc-600 italic">No advice yet...</p>'}
        </div>
        
        <div class="flex gap-2">
            <input type="text" id="input-${data._id}" placeholder="Write security advice..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-[11px] focus:outline-none focus:border-yellow-500">
            <button onclick="postComment('${data._id}')" class="bg-yellow-500 text-black px-3 py-1 rounded-lg text-[10px] font-black hover:bg-yellow-400">
                SEND
            </button>
        </div>
    </div>
    </article>`;
}
    // Live News (Fixing the "Same News" Problem)
    async function loadLiveHeadlines() {
        try {
            // Hum isme cache bust karne ke liye timestamp add karenge
            const response = await fetch('https://cybershield-backend-pt18.onrender.com/api/cyber-news?t=' + Date.now());
            const data = await response.json();
            if (data.success && data.news) {
                const ticker = document.getElementById('newsTicker');
                ticker.innerHTML = data.news.map(item => `
                    <div class="ticker-item px-10 text-xs font-bold text-zinc-400">
                        <span class="text-red-600">● LIVE ALERT:</span> ${item}
                    </div>`).join('');
                ticker.innerHTML += ticker.innerHTML; 
            }
        } catch (err) { }
    }

    // 1. LIKE LOGIC
async function handleLike(postId, btn) {
    // Agar pehle se liked hai toh rok do
    if(btn.classList.contains('liked')) return; 

    try {
        const res = await fetch(`https://cybershield-backend-pt18.onrender.com/api/reports/${postId}/like`, { method: 'POST' });
        const data = await res.json();
        if(data.success) {
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('span');
            
            icon.classList.replace('fa-regular', 'fa-solid');
            icon.classList.add('text-red-500');
            btn.classList.add('liked'); // Mark as liked
            countSpan.innerText = data.likes;
            
            // LocalStorage mein save kar lo taaki refresh par bhi yaad rahe (Optional)
            localStorage.setItem(`liked_${postId}`, 'true');
        }
    } catch (err) { console.log("Like failed"); }
}

function handleShare(text, postId) {
    // 1. Tumhari Netlify Link
    const shareUrl = "https://cybershildhub.netlify.app/"; 
    
    // 2. Text ko clean karo
    const cleanText = text.replace(/["']/g, "").substring(0, 150);
    
    // 3. 🛑 IMPORTANT: shareMessage ke andar link ko 'embed' karna padega
    const shareMessage = `🛑 *SECURITY ALERT FROM CYBERSHIELD* 🛑\n\n"${cleanText}..." \n\n⚠️ Be careful! Check full details here:\n${shareUrl}\n\n#CyberSecurity #StaySafe`;

    if (navigator.share) {
        navigator.share({
            title: '⚠️ CyberShield Threat Alert!',
            text: shareMessage, // Ab isme link bhi hai!
            url: shareUrl       // Browser support ke liye URL alag se bhi dalo
        })
        .then(() => console.log('Shared successfully'))
        .catch((err) => {
            console.log("Share failed, trying clipboard...");
            copyToClipboard(shareMessage);
        });
    } else {
        copyToClipboard(shareMessage);
    }
}
// Ek alag function Clipboard ke liye taaki code saaf rahe
function copyToClipboard(fullMessage) {
    navigator.clipboard.writeText(fullMessage)
        .then(() => {
            alert("✅ Threat details copied to clipboard!\nPaste it in WhatsApp to warn others.");
        })
        .catch(err => {
            alert("Manual Copy: " + fullMessage);
        });
}
// 3. COMMENT LOGIC (Simple Prompt for now)
// 1. Comment box ko dikhane ya chhupane ke liye
function toggleCommentBox(postId) {
    const box = document.getElementById(`comment-section-${postId}`);
    box.classList.toggle('hidden');
}

// 2. Comment post karne ke liye
async function postComment(postId) {
    const input = document.getElementById(`input-${postId}`);
    const commentText = input.value;
    const currentUser = localStorage.getItem("currentUser") || "Anonymous";

    if (!commentText) return;

    try {
        const res = await fetch(`https://cybershield-backend-pt18.onrender.com/api/reports/${postId}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser, text: commentText })
        });
        
        const data = await res.json();
        if (data.success) {
            // Turant UI mein comment add karo bina refresh kiye
            const list = document.getElementById(`comments-list-${postId}`);
            const newComment = `
                <div class="text-[11px] bg-zinc-900/50 p-2 rounded-lg border border-zinc-800 animate-fade-in">
                    <span class="text-yellow-500 font-bold">${currentUser}:</span> 
                    <span class="text-zinc-300">${commentText}</span>
                </div>`;
            
            // "No advice yet" text hatao agar pehla comment hai
            if (list.innerHTML.includes('No advice yet')) list.innerHTML = '';
            
            list.insertAdjacentHTML('beforeend', newComment);
            input.value = ''; // Input clear karo
        }
    } catch (err) { alert("Error posting comment"); }
}
</script>
</body>
