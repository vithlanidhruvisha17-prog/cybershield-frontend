<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield Hub - Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#0b0b0b;}
::-webkit-scrollbar-thumb{background:#FFD700;border-radius:10px;}
</style>

<script>

function handleLogin(){

const username=document.getElementById("login-username").value;
const password=document.getElementById("login-password").value;

if(username==="" || password===""){
alert("Please enter username and password");
return;
}

localStorage.setItem("isLoggedIn","true");
localStorage.setItem("currentUser",username);

window.location.href="report.html";

}

</script>

</head>

<body class="bg-[#0b0b0b] text-white min-h-screen font-sans selection:bg-[#FFD700] selection:text-black">

<nav class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-20 py-6">

<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-[#FFD700] rounded-lg flex items-center justify-center text-black font-black text-xl">C</div>
<span class="text-[#FFD700] text-2xl font-black uppercase">CyberShield Hub</span>
</div>

<a href="signup.html"
class="bg-[#FFD700] text-black text-[10px] font-black uppercase tracking-widest px-8 py-3 rounded-full border-2 border-[#FFD700] hover:bg-transparent hover:text-[#FFD700] transition-all">
Sign Up
</a>

</nav>


<main class="min-h-screen flex justify-center items-center pt-32 pb-10 px-4">

<div class="flex flex-col md:flex-row w-full max-w-5xl bg-[#121212] rounded-[35px] overflow-hidden shadow-2xl border border-white/5">

<div class="w-full md:w-5/12 p-12 md:p-16 flex flex-col justify-center bg-gradient-to-br from-[#1a1a1a] to-[#121212]">

<h1 class="text-5xl md:text-6xl font-black leading-[0.9] mb-6 uppercase">
CYBER <br> SECURITY
</h1>

<p class="text-gray-500 text-sm leading-relaxed max-w-[260px]">
A Platform to Report, Analyze & Prevent Cyber Threats
</p>

<div class="mt-10 w-20 h-1 bg-[#FFD700] rounded-full opacity-50"></div>

</div>


<div class="w-full md:w-7/12 p-10 md:p-14 bg-[#1f1f1f]/50 backdrop-blur-sm">

<form class="space-y-6" onsubmit="event.preventDefault();handleLogin();">

<div class="space-y-1">

<label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">
Username
</label>

<input
type="text"
id="login-username"
placeholder="Username"
class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 text-sm">

</div>


<div class="space-y-1">

<label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">
Password
</label>

<input
type="password"
id="login-password"
placeholder="Password"
class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 text-sm">

<div class="flex justify-end">
<a href="#" class="text-[10px] text-gray-500 hover:text-[#FFD700] mt-2">
Forgot Password?
</a>
</div>

</div>


<button
type="submit"
class="w-full bg-[#FFD700] text-black font-extrabold py-4 rounded-full border-2 border-[#FFD700] hover:bg-transparent hover:text-[#FFD700] transition-all">

Login

</button>


<button
type="button"
class="w-full border border-gray-800 py-3.5 rounded-xl text-gray-400 text-[11px] font-bold hover:border-[#FFD700]/50 hover:text-white">

CONTINUE WITH GOOGLE

</button>


<p class="text-center text-sm text-gray-500 mt-6 font-medium">

New user ?
<a href="signup.html" class="text-[#FFD700] font-black hover:underline ml-1">
Sign Up
</a>

</p>

</form>

</div>

</div>

</main>

</body>
</html>
