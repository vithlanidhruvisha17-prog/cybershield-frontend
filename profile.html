<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CyberShield Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .insta-tab-active { border-top: 2px solid white; color: white; margin-top: -1px; }
        .scanning-text { color: #FFD700; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
    <script>
        // 1. Instant Security Check (Redirects if not logged in)
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "login.html";
        }

        // 2. Navbar Update (Runs after body loads)
        window.onload = function() {
            const currentUser = localStorage.getItem("currentUser");
            // Dhyaan dena ki har page par navbar buttons ka container '.flex.items-center.gap-4' hi ho
            const navRight = document.querySelector('.flex.items-center.gap-4');
            document.getElementById('profile-username').innerText = currentUser;

            if (currentUser && navRight) {
                navRight.innerHTML = `
                    <div class="flex items-center gap-3 bg-black/20 p-1 pr-4 rounded-full border border-white/5">
                        <div class="w-8 h-8 bg-[#FFD700] rounded-full flex items-center justify-center text-black font-black text-sm">
                            ${currentUser.charAt(0).toUpperCase()}
                        </div>
                        <span class="text-[#FFD700] text-xs font-bold uppercase tracking-widest">${currentUser}</span>
                        <button onclick="logout()" class="ml-2 text-[10px] text-red-500 font-black hover:text-red-400 transition-colors">LOGOUT</button>
                    </div>
                `;
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-[#0b0b0b] text-white font-sans selection:bg-[#FFD700] selection:text-black">

<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-20 py-6 transition-all duration-300 ease-in-out">
    <div class="flex items-center gap-2 group cursor-pointer">
        <div class="w-8 h-8 bg-[#FFD700] rounded-lg flex items-center justify-center text-black font-black text-xl shadow-[0_0_15px_rgba(255,215,0,0.3)]">C</div>
        <span class="text-[#FFD700] text-2xl font-black tracking-tighter uppercase group-hover:tracking-normal transition-all">CyberShield Hub</span>
    </div>

    <ul class="hidden md:flex items-center space-x-10">
        <li><a href="index.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Home</a></li>
        <li><a href="report.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Posts</a></li>
        <li><a href="tutorial.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Tutorial</a></li>
        <li><a href="live.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Live</a></li>
        <li><a href="about.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">About</a></li>
    </ul>

        <div class="flex items-center gap-4"> 
    <a href="profile.html" class="flex items-center gap-3 border-2 border-yellow-400 rounded-full p-0.5">
        <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-yellow-400">
            <i class="fa-solid fa-user"></i>
        </div>
    </a>
</div>
    </nav>

<div class="max-w-4xl mx-auto pt-32 px-4">
    <header class="flex flex-col md:flex-row items-center gap-10 md:gap-20 mb-12 pb-10 border-b border-zinc-800">
        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-2 border-yellow-400 p-1">
            <div class="w-full h-full rounded-full bg-zinc-900 flex items-center justify-center text-4xl text-yellow-400">
                <i class="fa-solid fa-user-shield"></i>
            </div>
        </div>
        <div class="flex-1 text-center md:text-left">
            <h2 id="profile-username" class="text-2xl font-light mb-4">Dhruvi_17</h2>
            <div class="flex justify-center md:justify-start gap-8 mb-4 text-sm">
                <span><b class="text-white">12</b> reports</span>
                <span><b class="text-white">128</b> followers</span>
                <span><b class="text-white">250</b> following</span>
            </div>
            <p class="text-sm font-bold">Dhruvi</p>
            <p class="text-sm text-zinc-400">Cyber Security Enthusiast | Reporting for Safety 🛡️</p>
        </div>
    </header>

    <section class="mb-12">
        <div class="bg-zinc-900/30 border border-zinc-800 rounded-xl p-6 shadow-xl">
            <h3 class="text-xs font-black text-yellow-400 uppercase tracking-widest mb-4">Analyze New Threat</h3>
            <textarea id="user-attack-input" 
                class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 text-sm focus:outline-none focus:border-yellow-400 transition-all resize-none" 
                placeholder="Paste suspicious message or upload a screenshot for AI recovery steps..." rows="4"></textarea>
            
            <div class="flex justify-between items-center mt-5">
                <label class="group cursor-pointer flex items-center gap-2 text-zinc-500 hover:text-yellow-400 transition">
                    <div class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center group-hover:bg-yellow-400/10">
                        <i class="fa-solid fa-camera-retro"></i>
                    </div>
                    <span class="text-xs font-bold">Attach Evidence</span>
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </label>
                
                <button id="submit-profile-post" class="bg-yellow-400 text-black px-8 py-3 rounded-full font-black text-xs uppercase hover:bg-white transition-all shadow-lg">
                    Analyze & Post to Feed
                </button>
            </div>
        </div>
    </section>

    <div class="flex justify-center border-t border-zinc-800">
        <div class="flex gap-16">
            <div class="insta-tab-active pt-4 text-[10px] font-bold tracking-widest uppercase flex items-center gap-2 cursor-pointer">
                <i class="fa-solid fa-table-cells"></i> My History
            </div>
        </div>
    </div>
    <div id="personal-grid" class="py-10 text-center text-zinc-600 text-xs italic">
        Recent analysis reports will appear here.
    </div>
</div>

<script>
    window.addEventListener('scroll', function() {
    const navbar = document.getElementById('navbar');
    if (window.scrollY > 50) {
        navbar.classList.add('bg-[#0b0b0b]/80', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
        navbar.classList.remove('py-6');
    } else {
        navbar.classList.remove('bg-[#0b0b0b]/80', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
        navbar.classList.add('py-6');
    }
});

    // OCR Logic
    document.getElementById('fileInput').addEventListener('change', async function() {
        const textArea = document.getElementById('user-attack-input');
        if (this.files.length === 0) return;

        const formData = new FormData();
        formData.append('image', this.files[0]);

        textArea.value = "AI is reading the screenshot... 🔍";
        textArea.classList.add('scanning-text');

        try {
            const response = await fetch('https://cybershield-backend-pt18.onrender.com/api/analyze-image', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                textArea.value = data.extractedText;
            }
        } catch (error) {
            alert("OCR Server Error!");
        } finally {
            textArea.classList.remove('scanning-text');
        }
    });

    // Analysis Logic
    document.getElementById('submit-profile-post').addEventListener('click', async function() {
        const text = document.getElementById('user-attack-input').value;
        const btn = this;
        if (!text || text.includes("reading")) return alert("Provide text or image!");

        btn.innerText = "AI ANALYZING... ⚡";
        btn.disabled = true;

        try {
            const response = await fetch('https://cybershield-backend-pt18.onrender.com/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();
            if (data.success) {
                alert("AI Analysis Complete! Redirecting to Public Feed.");
                window.location.href = 'report.html';
            }
        } catch (error) {
            alert("Analysis Failed!");
        } finally {
            btn.innerText = "Analyze & Post to Feed";
            btn.disabled = false;
        }
    });

    async function loadMyHistory() {
    try {
        const res = await fetch('https://cybershield-backend-pt18.onrender.com/reports');
        const data = await res.json();
        const grid = document.getElementById('personal-grid');
        
        if(data.length > 0) {
            grid.innerHTML = data.map(post => `
                <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-3 text-left mb-4">
                    <p class="text-[10px] text-yellow-500 font-bold uppercase mb-1">Analysis Result</p>
                    <p class="text-[11px] text-zinc-300 line-clamp-2">${post.result}</p>
                </div>
            `).join('');
            grid.classList.remove('italic', 'text-zinc-600');
        }
    } catch (err) { console.log("History Load Error"); }
}
// window.onload ke andar isse call kar dena
</script>
</body>
</html>
