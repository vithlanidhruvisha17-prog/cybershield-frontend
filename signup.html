<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield Hub - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
    </style>
</head>
<div id="successModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0 pointer-events-none">
    <div class="bg-[#161616] border border-[#FFD700]/30 p-10 rounded-[30px] shadow-[0_0_50px_rgba(255,215,0,0.1)] text-center max-w-sm w-full mx-4 transform transition-transform duration-300 scale-90">
        
        <div class="w-20 h-20 bg-[#FFD700] rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(255,215,0,0.4)]">
            <svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h2 class="text-2xl font-black text-white mb-2 uppercase tracking-tight">Success!</h2>
        <p class="text-gray-400 text-sm mb-8">Your account has been created successfully. Welcome to CyberShield Hub.</p>
        
        <a href="report.html">
        <button onclick="closeModal()" class="w-full bg-[#FFD700] text-black font-bold py-3 rounded-full hover:bg-transparent hover:text-[#FFD700] border-2 border-[#FFD700] transition-all duration-300">
            Let's Go
        </button></a>
    </div>
</div>

<script>
async function handleSignup() {
    const data = {
        fullname: document.getElementById('signup-fullname').value,
        email: document.getElementById('signup-email').value,
        username: document.getElementById('signup-username').value,
        password: document.getElementById('signup-password').value
    };

    const res = await fetch('https://cybershield-backend-pt18.onrender.com/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const result = await res.json();
    if (result.success) {
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("currentUser", result.user.username);
        showSuccess(); // Tumhara success modal yahan chalega
    } else {
        alert("Error: " + result.message);
    }
}

    function showSuccess() {
        const modal = document.getElementById('successModal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        modal.children[0].classList.remove('scale-90');
    }

    function closeModal() {
        const modal = document.getElementById('successModal');
        modal.classList.add('opacity-0', 'pointer-events-none');
        modal.children[0].classList.add('scale-90');
    }
</script>
<body class="bg-[#0b0b0b] text-white min-h-screen font-sans selection:bg-[#FFD700] selection:text-black">
        
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-20 py-6 transition-all duration-300 ease-in-out">
    
    <div class="flex items-center gap-2 group cursor-pointer">
        <div class="w-8 h-8 bg-[#FFD700] rounded-lg flex items-center justify-center text-black font-black text-xl shadow-[0_0_15px_rgba(255,215,0,0.3)]">C</div>
        <span class="text-[#FFD700] text-2xl font-black tracking-tighter uppercase group-hover:tracking-normal transition-all">CyberShield Hub</span>
    </div>
    <div class="flex items-center gap-4">
        <a href="login.html" class="bg-[#FFD700] text-black text-[10px] font-black uppercase tracking-widest px-8 py-3 rounded-full border-2 border-[#FFD700] hover:bg-transparent hover:text-[#FFD700] transition-all duration-300 shadow-lg shadow-[#FFD700]/10">
            Login 
        </a>
    </div>
    </nav>
    <main class="min-h-screen flex justify-center items-center pt-32 pb-10 px-4">
        <div class="flex flex-col md:flex-row w-full max-w-5xl bg-[#161616] rounded-[30px] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5">            
            <div class="w-full md:w-5/12 p-12 md:p-16 flex flex-col justify-center bg-gradient-to-br from-[#1a1a1a] to-[#121212]">
                <h1 class="text-5xl md:text-6xl font-black leading-[0.9] mb-6 tracking-tighter uppercase">
                    CYBER <br> <span class="text-white/90">SECURITY</span>
                </h1>
                <p class="text-gray-500 text-sm leading-relaxed max-w-[260px]">
                    A Platform to Report, Analyze & Prevent Cyber Threats
                </p>
                <div class="mt-10 w-20 h-1 bg-[#FFD700] rounded-full opacity-50"></div>
            </div>

            <div class="w-full md:w-7/12 p-10 md:p-14 bg-[#1f1f1f]/50 backdrop-blur-sm">
                <form class="space-y-5">
                    <div class="space-y-1">
                        <label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">Full Name</label>
                        <input type="text" id="signup-fullname" placeholder="Full Name" class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">Email Address</label>
                        <input type="email" id="signup-email" placeholder="Email Address" class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">Username</label>
                        <input type="text" id="signup-username" placeholder="Username" class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 transition-all text-sm">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-1">
                            <label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">Password</label>
                            <input type="password" id="signup-password" placeholder="Password" class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 transition-all text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[#FFD700] text-xs font-bold uppercase tracking-widest ml-1">Confirm Password</label>
                            <input type="password" id="signup-confirm" placeholder="Confirm Password" class="w-full p-3.5 bg-[#0e0e0e] border border-white/5 rounded-xl outline-none focus:border-[#FFD700]/50 transition-all text-sm">
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-3 text-xs text-gray-500 py-2">
                        <input type="checkbox" class="w-4 h-4 rounded accent-[#FFD700] cursor-pointer">
                        <label class="cursor-pointer hover:text-gray-300 transition-colors">I agree to the Terms & Condition</label>
                    </div>

                    <button type="button" onclick="handleSignup()" class="w-full bg-[#FFD700] text-black font-extrabold py-4 rounded-full border-2 border-[#FFD700] transition-all duration-300 hover:bg-transparent hover:text-[#FFD700] mt-4 shadow-lg shadow-black/20">
                        Create Account
                    </button>
                    
                    <p class="text-center text-sm text-gray-500 mt-6 font-medium">
                        Already have an account? <a href="login.html" class="text-[#FFD700] font-black hover:underline decoration-1 underline-offset-4 ml-1">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
